name: Build Electron Desktop

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build:web

      - name: Package desktop app
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist -w electron -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish desktop app
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run dist -w electron -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-dam-${{ matrix.os }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.exe
            electron/dist/*.blockmap
            electron/dist/latest*.yml
          if-no-files-found: warn
